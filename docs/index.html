<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linked Markdown</title>
  <meta name="description" content="TypeScript library for extracting structured frontmatter and RDF data from Linked Markdown documents. YAML, JSON, and TOML support.">
  <meta property="og:title" content="Linked Markdown">
  <meta property="og:description" content="TypeScript library for extracting structured frontmatter and RDF data from Linked Markdown documents.">
  <meta property="og:url" content="https://linked-markdown.js.org">
  <meta property="og:image" content="https://linked-markdown.js.org/artwork.png">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔗</text></svg>">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Courier New', Courier, monospace;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      image-rendering: pixelated;
    }
    .container {
      max-width: 640px;
      width: 100%;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }
    .artwork {
      width: 100%;
      max-width: 480px;
      border: 3px solid #4a7c59;
      border-radius: 0;
      image-rendering: pixelated;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #7ec8a0;
      text-align: center;
    }
    .subtitle {
      font-size: 0.9rem;
      color: #8899aa;
      text-align: center;
      line-height: 1.6;
      max-width: 480px;
    }
    .links {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .link-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border: 2px solid #4a7c59;
      background: transparent;
      color: #7ec8a0;
      text-decoration: none;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: background 0.15s, color 0.15s;
    }
    .link-btn:hover {
      background: #4a7c59;
      color: #1a1a2e;
    }
    .badges {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .badges img {
      image-rendering: auto;
    }
    .footer {
      margin-top: 1rem;
      font-size: 0.75rem;
      color: #555;
    }
    .footer a {
      color: #4a7c59;
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }
    @media (max-width: 480px) {
      h1 { font-size: 1.5rem; }
      .container { padding: 1.5rem 1rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="artwork.png" alt="Linked Markdown artwork" class="artwork" width="480" height="480">
    <h1>Linked Markdown</h1>
    <p class="subtitle">
      TypeScript implementation of Linked Markdown — extract structured frontmatter
      (YAML, JSON, TOML) and RDF data from markdown documents. Published on JSR.
    </p>
    <div class="badges">
      <a href="https://jsr.io/@wazoo/linked-markdown"><img src="https://jsr.io/badgen/@wazoo/linked-markdown" alt="JSR"></a>
      <a href="https://jsr.io/@wazoo/linked-markdown/score"><img src="https://jsr.io/badgen/@wazoo/linked-markdown/score" alt="JSR Score"></a>
      <a href="https://github.com/wazootech/linked-markdown-ts"><img src="https://img.shields.io/badge/license-MIT-blue.svg" alt="MIT License"></a>
    </div>
    <div class="links">
      <a href="https://jsr.io/@wazoo/linked-markdown" class="link-btn">📦 JSR Package</a>
      <a href="https://github.com/wazootech/linked-markdown-ts" class="link-btn">&#x3C;/&#x3E; GitHub</a>
    </div>
    <div class="footer">
      <a href="https://github.com/wazootech/linked-markdown-ts">wazootech/linked-markdown-ts</a> &middot; MIT
    </div>
  </div>
</body>
</html>
